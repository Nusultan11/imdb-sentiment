name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify neural stack imports
        run: python -c "import numpy, torch; print(numpy.__version__); print(torch.__version__)"

      - name: Lint
        run: ruff check .

      - name: Run LSTM-focused tests
        run: >
          pytest -q
          tests/test_lstm_data.py
          tests/test_lstm_model.py
          tests/test_train_lstm.py
          tests/test_evaluation.py
          tests/test_inference.py
          tests/test_cli.py

      - name: Run tests
        run: pytest -q
