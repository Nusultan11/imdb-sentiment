experiment:
  family: tfidf
  name: baseline_v1

seed: 42

paths:
  model_output: artifacts/experiments/tfidf/baseline_v1/model.joblib
  val_metrics_output: artifacts/experiments/tfidf/baseline_v1/val_metrics.json
  test_metrics_output: artifacts/experiments/tfidf/baseline_v1/test_metrics.json

model:
  type: logistic_regression
  max_features: 20000
  ngram_range: [1, 2]
  max_iter: 1000
