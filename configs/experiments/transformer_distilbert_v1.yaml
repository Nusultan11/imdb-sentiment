experiment:
  family: transformer
  name: distilbert_v1

seed: 42

paths:
  model_output: artifacts/experiments/transformer/distilbert_v1/checkpoint
  val_metrics_output: artifacts/experiments/transformer/distilbert_v1/val_metrics.json
  test_metrics_output: artifacts/experiments/transformer/distilbert_v1/test_metrics.json

model:
  type: distilbert
  pretrained_model_name: distilbert-base-uncased
  max_length: 256
  batch_size: 16
  epochs: 3
  dropout: 0.1
  lr: 0.00002
  weight_decay: 0.01
