experiment:
  family: lstm
  name: baseline_v1

seed: 42

paths:
  model_output: artifacts/experiments/lstm/baseline_v1/model.pt
  val_metrics_output: artifacts/experiments/lstm/baseline_v1/val_metrics.json
  test_metrics_output: artifacts/experiments/lstm/baseline_v1/test_metrics.json
# The local LSTM trainer also writes vocab.json and training_config.json
# next to model_output inside the same artifact directory.

model:
  type: lstm
  vocab_size: 20000
  max_length: 256
  embedding_dim: 128
  hidden_dim: 128
  batch_size: 32
  epochs: 5
  dropout: 0.3
  lr: 0.001
