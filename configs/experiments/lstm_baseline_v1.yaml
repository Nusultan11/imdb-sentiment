experiment:
  family: lstm
  name: baseline_v1

seed: 42

paths:
  model_output: artifacts/experiments/lstm/baseline_v1/model.pt
  val_metrics_output: artifacts/experiments/lstm/baseline_v1/val_metrics.json
  test_metrics_output: artifacts/experiments/lstm/baseline_v1/test_metrics.json
# Keep LSTM artifacts flat in this directory:
# runtime files -> model.pt, vocab.json, training_config.json, val_metrics.json, test_metrics.json
# optional export files -> lstm_baseline_v1_artifacts.zip, lstm_v1_bundle.zip

model:
  type: lstm
  vocab_size: 30000
  max_length: 512
  embedding_dim: 128
  hidden_dim: 128
  bidirectional: false
  batch_size: 32
  epochs: 5
  dropout: 0.3
  lr: 0.001
