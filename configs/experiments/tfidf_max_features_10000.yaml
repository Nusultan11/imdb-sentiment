experiment:
  family: tfidf
  name: max_features_10000

seed: 42

paths:
  model_output: artifacts/experiments/tfidf/max_features_10000/model.joblib
  val_metrics_output: artifacts/experiments/tfidf/max_features_10000/val_metrics.json
  test_metrics_output: artifacts/experiments/tfidf/max_features_10000/test_metrics.json

model:
  type: logistic_regression
  max_features: 10000
  ngram_range: [1, 2]
  max_iter: 1000
