services:
  - type: web
    name: imdb-sentiment-web
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install . && python -m imdb_sentiment.cli train --config configs/experiments/tfidf_tuned_v2_final.yaml
    startCommand: python -m imdb_sentiment.render_entry
    healthCheckPath: /
    envVars:
      - key: IMDB_CONFIG
        value: configs/experiments/tfidf_tuned_v2_final.yaml
